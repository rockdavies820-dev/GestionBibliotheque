name: Build Installers
on:
  push:
    branches: [ main ]
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Lire la version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content version.txt -Raw
          $v = $v.Trim()
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build Windows Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path libs
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path out

          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/itextpdf/itextpdf/5.5.13.3/itextpdf-5.5.13.3.jar" -OutFile libs/itextpdf.jar
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/xerial/sqlite-jdbc/3.36.0.3/sqlite-jdbc-3.36.0.3.jar" -OutFile libs/sqlite.jar

          # Convertir favicon.ico en favicon.png pour JavaFX
          Add-Type -AssemblyName System.Drawing
          $ico = [System.Drawing.Icon]::ExtractAssociatedIcon("$PWD\src\favicon.ico")
          $bmp = $ico.ToBitmap()
          $bmp.Save("$PWD\src\favicon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          Write-Host "=== favicon.png cree ==="

          $javaHome = $env:JAVA_HOME
          $javafxLibs = "$javaHome\lib"
          $cp = "$javafxLibs\javafx.controls.jar;$javafxLibs\javafx.fxml.jar;$javafxLibs\javafx.base.jar;$javafxLibs\javafx.graphics.jar;libs\itextpdf.jar;libs\sqlite.jar"

          $sources = Get-ChildItem -Recurse -Filter "*.java" -Path src | Select-Object -ExpandProperty FullName
          Write-Host "=== Sources ==="
          $sources

          javac -encoding UTF-8 --module-path $javafxLibs --add-modules javafx.controls,javafx.fxml -cp $cp -d out $sources

          Write-Host "=== Classes dans out ==="
          Get-ChildItem -Recurse out -Filter "*.class"

          if ((Get-ChildItem -Recurse out -Filter "*.class").Count -eq 0) {
            Write-Error "ERREUR: Aucune classe compilee!"
            exit 1
          }

          Copy-Item src/favicon.ico out/favicon.ico
          Copy-Item src/favicon.png out/favicon.png

          jar --create --file dist/GestionBibliotheque.jar --main-class=MainApp -C out .

          Write-Host "=== Contenu JAR ==="
          jar tf dist/GestionBibliotheque.jar

          Copy-Item libs/itextpdf.jar dist/itextpdf.jar
          Copy-Item libs/sqlite.jar dist/sqlite.jar

          $jmodsPath = "$javaHome\jmods"
          jlink --module-path "$jmodsPath" --add-modules java.base,java.desktop,java.logging,java.sql,java.naming,java.xml,javafx.controls,javafx.fxml --output runtime-image --strip-debug --compress 2 --no-header-files --no-man-pages

          jpackage --input dist --name GestionBibliotheque --main-jar GestionBibliotheque.jar --type exe --runtime-image runtime-image --win-dir-chooser --win-shortcut --icon src/favicon.ico --java-options "-Dfile.encoding=UTF-8" --dest installer

          # Renommer l'installateur avec le numero de version
          $version = Get-Content version.txt -Raw
          $version = $version.Trim()
          $exePath = Get-ChildItem installer -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          Rename-Item $exePath "GestionBibliotheque-$version.exe"
          Write-Host "=== Installateur renomme : GestionBibliotheque-$version.exe ==="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/

      - name: Creer GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Version ${{ steps.version.outputs.VERSION }}
          body: |
            Release automatique de la version ${{ steps.version.outputs.VERSION }}
          files: installer/GestionBibliotheque-${{ steps.version.outputs.VERSION }}.exe
          token: ${{ secrets.GITHUB_TOKEN }}
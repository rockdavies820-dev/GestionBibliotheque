name: Build Installers
on:
  push:
    branches: [ main ]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'liberica'
          java-package: 'jdk+fx'
      - name: Build Windows Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path libs
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path out
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/itextpdf/itextpdf/5.5.13.3/itextpdf-5.5.13.3.jar" -OutFile libs/itextpdf.jar
          $javaHome = $env:JAVA_HOME
          Write-Host "JAVA_HOME: $javaHome"
          $javafxLibs = "$javaHome\lib"
          Write-Host "=== Contenu de lib ==="
          Get-ChildItem "$javaHome\lib" -Filter "*.jar"
          $cp = "$javafxLibs\javafx.controls.jar;$javafxLibs\javafx.fxml.jar;$javafxLibs\javafx.base.jar;$javafxLibs\javafx.graphics.jar;libs\itextpdf.jar"
          $sources = Get-ChildItem -Recurse -Filter "*.java" -Path src | Select-Object -ExpandProperty FullName
          javac --module-path $javafxLibs --add-modules javafx.controls,javafx.fxml -cp $cp -d out $sources
          Copy-Item src/favicon.ico out/favicon.ico
          jar --create --file dist/GestionBibliotheque.jar --main-class=MainApp -C out .
          Write-Host "=== Contenu JAR ==="
          jar tf dist/GestionBibliotheque.jar
          Copy-Item libs/itextpdf.jar dist/itextpdf.jar
          jpackage --input dist --name GestionBibliotheque --main-jar GestionBibliotheque.jar --type exe --win-dir-chooser --win-shortcut --icon src/favicon.ico --dest installer
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/
name: Build Installers

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Build Windows Installer
        run: |
          javac -cp "src;libs/*" src/*.java src/**/*.java -d out
          jar --create --file app.jar --main-class MainApp -C out .
          jpackage --input . --main-jar app.jar --name GestionBibliotheque --type msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Build Linux Installer
        run: |
          javac -cp "src:libs/*" src/*.java src/**/*.java -d out
          jar --create --file app.jar --main-class MainApp -C out .
          jpackage --input . --main-jar app.jar --name GestionBibliotheque --type deb

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Build Mac Installer
        run: |
          javac -cp "src:libs/*" src/*.java src/**/*.java -d out
          jar --create --file app.jar --main-class MainApp -C out .
          jpackage --input . --main-jar app.jar --name GestionBibliotheque --type dmg
name: Build Installers

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
      - name: Download JavaFX and iText
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip -OutFile javafx.zip
          Expand-Archive -Path javafx.zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path libs
          Invoke-WebRequest -Uri https://repo1.maven.org/maven2/com/itextpdf/itextpdf/5.5.13.3/itextpdf-5.5.13.3.jar -OutFile libs/itextpdf.jar
      - name: Build Windows Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out
          $fx = "javafx-sdk-17.0.2\lib"
          $fxjars = (Get-ChildItem "$fx\*.jar" | Select-Object -ExpandProperty FullName) -join ";"
          $cp = "libs\itextpdf.jar;" + $fxjars
          $files = Get-ChildItem -Path src -Recurse -Filter "*.java" | Select-Object -ExpandProperty FullName
          javac --module-path $fx --add-modules javafx.controls,javafx.fxml -cp $cp -d out $files
          Copy-Item libs\itextpdf.jar out\
          jar --create --file out/app.jar --main-class MainApp -C out .
          jpackage --input out --main-jar app.jar --name GestionBibliotheque --type msi --dest installer

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download JavaFX and iText
        run: |
          wget -q https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_linux-x64_bin-sdk.zip
          unzip -q openjfx-17.0.2_linux-x64_bin-sdk.zip
          mkdir -p libs
          wget -q https://repo1.maven.org/maven2/com/itextpdf/itextpdf/5.5.13.3/itextpdf-5.5.13.3.jar -O libs/itextpdf.jar
      - name: Build Linux Installer
        run: |
          mkdir -p out
          FX=javafx-sdk-17.0.2/lib
          FXJARS=$(find $FX -name "*.jar" | tr '\n' ':')
          CP=libs/itextpdf.jar:$FXJARS
          find src -name "*.java" > sources.txt
          javac --module-path $FX --add-modules javafx.controls,javafx.fxml -cp $CP -d out $(cat sources.txt)
          cp libs/itextpdf.jar out/
          jar --create --file out/app.jar --main-class MainApp -C out .
          jpackage --input out --main-jar app.jar --name GestionBibliotheque --type deb --dest installer

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download JavaFX and iText
        run: |
          wget -q https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip
          unzip -q openjfx-17.0.2_osx-x64_bin-sdk.zip
          mkdir -p libs
          wget -q https://repo1.maven.org/maven2/com/itextpdf/itextpdf/5.5.13.3/itextpdf-5.5.13.3.jar -O libs/itextpdf.jar
      - name: Build Mac Installer
        run: |
          mkdir -p out
          FX=javafx-sdk-17.0.2/lib
          FXJARS=$(find $FX -name "*.jar" | tr '\n' ':')
          CP=libs/itextpdf.jar:$FXJARS
          find src -name "*.java" > sources.txt
          javac --module-path $FX --add-modules javafx.controls,javafx.fxml -cp $CP -d out $(cat sources.txt)
          cp libs/itextpdf.jar out/
          jar --create --file out/app.jar --main-class MainApp -C out .
          jpackage --input out --main-jar app.jar --name GestionBibliotheque --type dmg --dest installer
